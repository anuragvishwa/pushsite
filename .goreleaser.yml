project_name: pushsite

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/anuragvishwa/pushsite/cmd.Version={{.Version}}
      - -X github.com/anuragvishwa/pushsite/cmd.GitCommit={{.Commit}}
      - -X github.com/anuragvishwa/pushsite/cmd.BuildTime={{.Date}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'

brews:
  - repository:
      owner: anuragvishwa
      name: homebrew-tap
    homepage: "https://github.com/anuragvishwa/pushsite"
    description: "Deploy frontend apps to EC2 instances"
    license: "MIT"
    install: |
      bin.install "pushsite"
    test: |
      system "#{bin}/pushsite", "version"
